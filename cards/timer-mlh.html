<HTML>
	<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .timer-card {
      background: white;
      color: #000;
      border-radius: 15px;
      width: 200px;
	  height: 200px;
      text-align: center;
      padding: 15px;
    }
    .input-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 2px;
    }
    input {
      width: 50px;
      padding: 4px;
      border-radius: 6px;
      border: none;
      text-align: center;
      font-size: 12px;
    }
    .label-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 10px;
      margin-bottom: 8px;
    }
    button {
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin: 3px;
	  font-size: 12px;
    }
    .start { background-color: limegreen; }
    .reset { background-color: tomato; }
  </style>
</head>
<body>

  <div class="timer-card">
    <h2>Countdown Timer</h2>

    <!-- Input boxes -->
    <div class="input-row">
      <input id="hours" type="number" placeholder="0">
      <input id="minutes" type="number" placeholder="0">
      <input id="seconds" type="number" placeholder="0">
    </div>

    <!-- Labels under inputs -->
    <div class="label-row">
      <span>Hours</span>
      <span>Minutes</span>
      <span>Seconds</span>
    </div>

    <div id="display">00:00:00</div>

	<button class="reset" onclick="resetTimer()">Reset</button>
    <button class="start" onclick="startTimer()">Start</button>
    
  </div>

  <script>
    let timer;
    let totalSeconds = 0;

    function startTimer() {
      clearInterval(timer);

      const hrs = parseInt(document.getElementById("hours").value) || 0;
      const mins = parseInt(document.getElementById("minutes").value) || 0;
      const secs = parseInt(document.getElementById("seconds").value) || 0;

      totalSeconds = hrs * 3600 + mins * 60 + secs;

      if (totalSeconds <= 0) {
        alert("Please enter a valid time.");
        return;
      }

      timer = setInterval(() => {
        if (totalSeconds <= 0) {
          clearInterval(timer);
          document.getElementById("display").textContent = "00:00:00";
          alert("Time's up!");
          return;
        }

        totalSeconds--;

        const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
        const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
        const s = String(totalSeconds % 60).padStart(2, '0');

        document.getElementById("display").textContent = `${h}:${m}:${s}`;
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timer);
      totalSeconds = 0;
      document.getElementById("display").textContent = "00:00:00";
      document.getElementById("hours").value = "";
      document.getElementById("minutes").value = "";
      document.getElementById("seconds").value = "";
    }
  </script>

</body>
</html>
