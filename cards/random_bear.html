<HTML>
	<HEAD>
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
		<script src="../js/utils.js"></script>

		<style>
			.randomBearImage {
				width: 180px;
				height: 180px;
			}
		</style>
		<script>
			// Web resources may change/disappear. Substitute as needed.
			// https://placebear.com/ serves the same image for the same
			// dimensions, so randomize width/height to get a different bear.
			$(() => {
				const bearWidth = 150 + Math.floor(Math.random() * 250);
				const bearHeight = 150 + Math.floor(Math.random() * 250);
				$('.randomBearImage').attr('src', `https://placebear.com/${bearWidth}/${bearHeight}`);
			});
		</script>
	</HEAD>
	<BODY>
		<img class='randomBearImage' />
	</BODY>
</HTML>
