
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipping Calculator</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        body {
            box-sizing: border-box;
            padding: 20px;
        }

        .calculator {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            max-width: 350px;
            margin: 0 auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 10px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            cursor: pointer;
        }

        .results {
            margin-top: 20px;
            text-align: center;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 15px;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <h1>Tipping Calculator</h1>

        <label for="billAmount">Bill Amount</label>
        <input
            type="number"
            id="billAmount"
            placeholder="Enter bill amount"
            min="0"
            step="0.01"
            oninput="limitDecimalPlaces(this)"
        >

        <label for="tipPercentage">Tip Percentage</label>
        <input
            type="number"
            id="tipPercentage"
            placeholder="Enter tip percentage"
            min="0"
            step="0.01"
            oninput="limitDecimalPlaces(this)"
        >

        <button type="button" onclick="calculateTip()">
            Calculate
        </button>

        <p id="errorMessage" class="error"></p>

        <div class="results">
            <p>Tip Amount: <span id="tipAmount">$0.00</span></p>
            <p>Total Amount: <span id="totalAmount">$0.00</span></p>
        </div>
    </div>

    <script>
        
        function limitDecimalPlaces(input) {
            const value = input.value;
            if (value.includes(".")) {
                const decimalPart = value.split(".")[1];
                if (decimalPart.length > 2) {
                    input.value = value.slice(0, value.length - (decimalPart.length - 2));
                }
            }
        }

        function calculateTip() {
            const billAmount = parseFloat(
                document.getElementById("billAmount").value
            );

            const tipPercentage = parseFloat(
                document.getElementById("tipPercentage").value
            );

            const errorMessage =
                document.getElementById("errorMessage");

            if (
                Number.isNaN(billAmount) ||
                Number.isNaN(tipPercentage) ||
                billAmount < 0 ||
                tipPercentage < 0
            ) {
                errorMessage.textContent =
                    "Please enter valid positive numbers.";

                document.getElementById("tipAmount").textContent =
                    "$0.00";

                document.getElementById("totalAmount").textContent =
                    "$0.00";

                return;
            }

            errorMessage.textContent = "";

            const tipAmount =
                billAmount * (tipPercentage / 100);

            const totalAmount =
                billAmount + tipAmount;

            document.getElementById("tipAmount").textContent =
                "$" + tipAmount.toFixed(2);

            document.getElementById("totalAmount").textContent =
                "$" + totalAmount.toFixed(2);
        }
    </script>
</body>
</html>
