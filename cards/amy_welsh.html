<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipping Calculator</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 200px;
            height: 200px;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        body {
            padding: 5px;
        }

        .calculator {
            width: 190px;
            height: 190px;
            overflow: hidden;
            background-color: white;
            border-radius: 8px;
            padding: 7px 10px;
            margin: 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            font-size: 15px;
            line-height: 1;
            margin: 2px 0 5px;
        }

        label {
            display: block;
            margin-top: 3px;
            margin-bottom: 1px;
            font-size: 10px;
        }

        input {
            width: 100%;
            height: 22px;
            padding: 2px 5px;
            font-size: 10px;
        }

        button {
            width: 100%;
            height: 23px;
            margin-top: 5px;
            padding: 2px;
            font-size: 10px;
            cursor: pointer;
        }

        .results {
            margin-top: 4px;
            text-align: center;
            font-size: 10px;
            line-height: 1.1;
        }

        .results p {
            margin: 2px 0;
        }

        .error {
            min-height: 11px;
            color: red;
            text-align: center;
            font-size: 9px;
            line-height: 1;
            margin: 3px 0 0;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <h1>Tipping Calculator</h1>

        <label for="billAmount">Bill Amount</label>
        <input
            type="number"
            id="billAmount"
            placeholder="Enter bill amount"
            min="0"
            step="0.01"
        >

        <label for="tipPercentage">Tip Percentage</label>
        <input
            type="number"
            id="tipPercentage"
            placeholder="Enter tip percentage"
            min="0"
            step="0.01"
        >

        <button type="button" onclick="calculateTip()">
            Calculate
        </button>

        <p id="errorMessage" class="error"></p>

        <div class="results">
            <p>Tip Amount: <span id="tipAmount">$0.00</span></p>
            <p>Total Amount: <span id="totalAmount">$0.00</span></p>
        </div>
    </div>

    <script>
        function calculateTip() {
            const billAmount = parseFloat(
                document.getElementById("billAmount").value
            );

            const tipPercentage = parseFloat(
                document.getElementById("tipPercentage").value
            );

            const errorMessage =
                document.getElementById("errorMessage");

            if (
                Number.isNaN(billAmount) ||
                Number.isNaN(tipPercentage) ||
                billAmount < 0 ||
                tipPercentage < 0
            ) {
                errorMessage.textContent =
                    "Please enter valid positive numbers.";

                document.getElementById("tipAmount").textContent =
                    "$0.00";

                document.getElementById("totalAmount").textContent =
                    "$0.00";

                return;
            }

            errorMessage.textContent = "";

            const tipAmount =
                billAmount * (tipPercentage / 100);

            const totalAmount =
                billAmount + tipAmount;

            document.getElementById("tipAmount").textContent =
                "$" + tipAmount.toFixed(2);

            document.getElementById("totalAmount").textContent =
                "$" + totalAmount.toFixed(2);
        }
    </script>
</body>
</html>
