
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Search App</title>
    <style>
        body {
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #121212;
            width: 600px;
            padding: 30px 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .input-bar {
            width: 90%;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            width: 90%;
            margin-bottom: 12px;
        }

        .btn-cyan {
            background: linear-gradient(180deg, #5ce1e6, #00c2cb);
            color: #333;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 48%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .btn-cyan:hover {
            opacity: 0.9;
        }

        .btn-search {
            background: linear-gradient(180deg, #5ce1e6, #00c2cb);
            color: #333;
            border: none;
            padding: 6px 25px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .btn-search:hover {
            opacity: 0.9;
        }

        .results-box {
            background-color: #ffffff;
            width: 90%;
            height: 380px;
            border-radius: 20px;
            padding: 15px;
            overflow-y: auto;
            color: #222;
            font-size: 14px;
            line-height: 1.2;
            box-sizing: border-box;
            white-space: pre-wrap;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
        }

        /* Custom Scrollbar styled to match the dark blue UI marker */
        .results-box::-webkit-scrollbar {
            width: 12px;
        }
        .results-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .results-box::-webkit-scrollbar-thumb {
            background-color: #0b2f61;
            border-radius: 10px;
            border: 3px solid #ffffff;
        }
        
        .entry {
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid #d9d9d9;
            word-wrap: break-word;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cover-image {
            max-width: 100px;
            max-height: 140px;
            object-fit: cover;
            border-radius: 6px;
            margin: 8px auto 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: block;
        }

        /* Highlight styling for keyword matching */
        .highlight {
            background-color: #ffeb3b;
            color: #000;
            padding: 0 2px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Search Bar (Title or Genre input) -->
        <input type="text" id="topInput" class="input-bar" placeholder="Enter Book Title or Genre">
        
        <!-- Strategy Action Buttons -->
        <div class="button-row">
            <button id="searchTitleBtn" class="btn-cyan">Search Title</button>
            <button id="searchGenreBtn" class="btn-cyan">Search Related</button>
        </div>

        <!-- Dynamic Output Scroll Box -->
        <div id="resultsBox" class="results-box">Use the inputs above to query Open Library or parse quotes.</div>
    </div>

    <script>
        const topInput = document.getElementById('topInput');
        const resultsBox = document.getElementById('resultsBox');

        function getCoverUrl(doc) {
            if (!doc || !doc.cover_i) return '';
            return `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg`;
        }

        function renderCoverImage(coverUrl, title) {
            if (!coverUrl) return '';
            return `<img src="${coverUrl}" alt="Cover for ${title}" class="cover-image">`;
        }

        // --- 1. SEARCH GENRE BUTTON ACTION ---
        document.getElementById('searchGenreBtn').addEventListener('click', async () => {
            const query = topInput.value.trim().toLowerCase();
            if (!query) {
                resultsBox.innerHTML = "Please enter a genre name into the top bar.";
                return;
            }
            
            resultsBox.innerHTML = "Fetching books matching genre...";
            try {
                const formattedGenre = query.replace(/\s+/g, '_');
                // Querying Open Library Subject/Genre API Route
                const response = await fetch(`https://openlibrary.org/subjects/${encodeURIComponent(formattedGenre)}.json?limit=15`);
                if (!response.ok) throw new Error();
                const data = await response.json();

                if (!data.works || data.works.length === 0) {
                    resultsBox.innerHTML = `No items found under genre: "${query}". Try 'horror', 'history', or 'fantasy'.`;
                    return;
                }

                resultsBox.innerHTML = `<h3>Books under category: "${query}"</h3>`;
                data.works.forEach((work, index) => {
                    const author = work.authors && work.authors.length > 0 ? work.authors[0].name : "Unknown Author";
                    const coverUrl = work.cover_edition_key ? `https://covers.openlibrary.org/b/olid/${work.cover_edition_key}-M.jpg` : '';
                    resultsBox.innerHTML += `
                        <div class="entry">
                            <strong>#${index + 1} ${work.title}</strong><br>
                            Author: ${author} ${work.first_publish_year ? `(${work.first_publish_year})` : ''}<br>
                            ${renderCoverImage(coverUrl, work.title)}
                        </div>`;
                });
            } catch (error) {
                resultsBox.innerHTML = "Error pulling data from Open Library Subject API.";
            }
        });

        // --- 2. SEARCH TITLE BUTTON ACTION ---
        document.getElementById('searchTitleBtn').addEventListener('click', async () => {
            const query = topInput.value.trim();
            if (!query) {
                resultsBox.innerHTML = "Please enter a book title into the top bar.";
                return;
            }

            resultsBox.innerHTML = "Searching Open Library Title Catalog...";
            try {
                // Search Main Catalog API
                const response = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=10`);
                if (!response.ok) throw new Error();
                const data = await response.json();

                if (!data.docs || data.docs.length === 0) {
                    resultsBox.innerHTML = `No books found with the title: "${query}".`;
                    return;
                }

                resultsBox.innerHTML = `<h3>Matches found for "${query}":</h3>`;
                data.docs.forEach((book) => {
                    const title = book.title || "N/A";
                    const author = book.author_name ? book.author_name.join(', ') : "Unknown Author";
                    const publisher = book.publisher ? book.publisher.slice(0, 3).join(', ') : "Unknown Publisher";
                    const pubYear = book.first_publish_year || "N/A";

                    const coverUrl = getCoverUrl(book);
                    resultsBox.innerHTML += `
                        <div class="entry">
                            <strong>Title:</strong> ${title}<br>
                            <strong>Author:</strong> ${author}<br>
                            <strong>Publisher:</strong> ${publisher}<br>
                            <strong>First Published:</strong> ${pubYear}<br>
                            ${renderCoverImage(coverUrl, title)}
                        </div>`;
                });
            } catch (error) {
                resultsBox.innerHTML = "Error retrieving metrics from Open Library Search API.";
            }
        });

	</script>
