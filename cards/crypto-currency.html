<HTML>
<HEAD>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../js/utils.js"></script>
<style>
	body {
		font-family: Arial, sans-serif;
		text-align: center;
	}
	.crypto-submit {
		background-color: green;
		color: white;
		border: 1px solid #333;
		padding: 5px 10px;
		cursor: pointer;
	}
	.crypto-result {
		margin-top: 3px;
		font-size: 11px; 
	}	
	.crypto-result p {
    margin: 3px 0;
}
</style>
<script>
function getTodayFormatted() {
	var today = new Date();
	var mm = String(today.getMonth() + 1).padStart(2, '0');
	var dd = String(today.getDate()).padStart(2, '0');
	var yyyy = today.getFullYear();
	return mm + '/' + dd + '/' + yyyy;
}

function lookupCrypto() {
	var symbol = $('#cryptoSymbol').val().trim().toUpperCase();

	if (!symbol) {
		return;
	}

	// Step 1: search by symbol to get the CoinPaprika coin id
	$.getJSON('https://api.coinpaprika.com/v1/search?q=' + symbol + '&c=currencies&limit=1', function(searchResult) {
		if (!searchResult.currencies || searchResult.currencies.length === 0) {
			$('#cryptoSymbolDisplay').text('Not found');
			$('#resultArea').html('No coin found for symbol: ' + symbol);
			return;
		}

		var coinId = searchResult.currencies[0].id;
		var coinName = searchResult.currencies[0].name;
		$('#cryptoSymbolDisplay').text(coinName);

		// Step 2: fetch ticker data for that coin id
		$.getJSON('https://api.coinpaprika.com/v1/tickers/' + coinId, function(data) {
			var price = data.quotes.USD.price;
			var pctChange24h = data.quotes.USD.percent_change_24h;

			// CoinPaprika free tier returns % change, not $ change,
			// so we derive the approximate dollar change from price + percent.
			var previousPrice = price / (1 + (pctChange24h / 100));
			var dollarChange24h = price - previousPrice;

			$('#priceValue').text('$' + price.toFixed(2));
			$('#changeValue').text((dollarChange24h >= 0 ? '+' : '') + '$' + dollarChange24h.toFixed(2));
			$('#dateValue').text(getTodayFormatted());
			$('#rankValue').text(data.rank);
			$('#totalSupplyValue').text(data.total_supply ? data.total_supply.toLocaleString() : 'N/A');
			$('#maxSupplyValue').text(data.max_supply ? data.max_supply.toLocaleString() : 'N/A');
		}).fail(function() {
			$('#resultArea').html('Error retrieving data for ' + symbol);
		});
	}).fail(function() {
		$('#resultArea').html('Error searching for symbol: ' + symbol);
	});
}
</script>
</HEAD>
<BODY>

<h1 style="text-align:center; font-size:15px;">Cryptocurrency</h1>

<div>
	<label for="cryptoSymbol">Enter Symbol</label>
	<input type="text" id="cryptoSymbol" style="width:60px; background-color:aqua; color:black;" placeholder="e.g. BTC" />
	<span id="cryptoSymbolDisplay" style="width:60px; background-color:aqua; color:black; display:inline-block; padding:4px; border:1px solid #333;"></span>
	<button class="crypto-submit" onclick="lookupCrypto();">Submit</button>
</div>

<div id="resultArea" class="crypto-result">
	<p>Current Value: <span id="priceValue">--</span></p>
	<p>24hr Change: <span id="changeValue">--</span></p>
	<p>Date: <span id="dateValue">--</span></p>
	<p>Rank: <span id="rankValue">--</span></p>
	<p>Total Supply: <span id="totalSupplyValue">--</span></p>
	<p>Max Supply: <span id="maxSupplyValue">--</span></p>
</div>

</BODY>
</HTML>
